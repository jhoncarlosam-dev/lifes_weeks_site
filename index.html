<script>
  const birthDate = new Date("1999-05-05");
  const today = new Date();
  const msPerWeek = 7 * 24 * 60 * 60 * 1000;
  const weeksPassed = Math.floor((today - birthDate) / msPerWeek);
  const totalSemanas = 90 * 52;
  const gridContainer = document.getElementById("weekGrid");

  // Cargar notas desde localStorage
  const STORAGE_KEY = "lifesWeeks_notes";
  function loadNotes() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    } catch (e) {
      return {};
    }
  }
  function saveNotes(notes) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  // Fecha de inicio de la semana y año
  function weekStartDate(birthDate, weekNumber) {
    const d = new Date(birthDate);
    d.setDate(d.getDate() + (weekNumber - 1) * 7);
    return d;
  }
  function weekYear(birthDate, weekNumber) {
    return weekStartDate(birthDate, weekNumber).getFullYear();
  }

  // Crear modal simple
  const modal = document.createElement("div");
  modal.style = "position:fixed;left:0;top:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);";
  modal.innerHTML = `
    <div style="background:#fff;padding:16px;border-radius:8px;max-width:480px;width:90%;">
      <h3 id="modalTitle"></h3>
      <textarea id="noteText" style="width:100%;height:120px"></textarea>
      <div style="margin-top:8px;text-align:right;">
        <button id="deleteNote">Eliminar</button>
        <button id="closeModal">Cerrar</button>
        <button id="saveNote">Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  const notes = loadNotes();

  // Render grid
  for (let i = 0; i < totalSemanas; i++) {
    const weekNum = i + 1;
    const box = document.createElement("div");
    box.className = "box";
    if (i < weeksPassed) box.classList.add("used");
    if (notes[`w-${weekNum}`]) box.style.boxShadow = "inset 0 0 0 3px #ffcc00";
    box.textContent = weekNum;
    box.dataset.week = weekNum;
    box.addEventListener("click", () => openModal(weekNum));
    gridContainer.appendChild(box);
  }

  // Modal handlers
  const modalTitle = modal.querySelector("#modalTitle");
  const noteText = modal.querySelector("#noteText");
  const saveBtn = modal.querySelector("#saveNote");
  const closeBtn = modal.querySelector("#closeModal");
  const deleteBtn = modal.querySelector("#deleteNote");
  let currentWeek = null;

  function openModal(week) {
    currentWeek = week;
    const start = weekStartDate(birthDate, week);
    modalTitle.textContent = `Semana ${week} — inicio ${start.toLocaleDateString()} — año ${weekYear(birthDate, week)}`;
    noteText.value = notes[`w-${week}`]?.text || "";
    modal.style.display = "flex";
  }
  saveBtn.addEventListener("click", () => {
    notes[`w-${currentWeek}`] = { text: noteText.value, startDate: weekStartDate(birthDate, currentWeek).toISOString(), year: weekYear(birthDate, currentWeek) };
    saveNotes(notes);
    location.reload(); // simple refresh to update markers
  });
  deleteBtn.addEventListener("click", () => {
    delete notes[`w-${currentWeek}`];
    saveNotes(notes);
    location.reload();
  });
  closeBtn.addEventListener("click", () => modal.style.display = "none");

  // Mostrar métricas
  document.getElementById("ageInWeeks").textContent = `${weeksPassed} semanas`;
  document.getElementById("ageInYears").textContent = `${Math.floor(weeksPassed / 52)} años`;
  const remainingWeeks = totalSemanas - weeksPassed;
  document.getElementById("remainingWeeks").textContent = `${remainingWeeks} semanas`;
  document.getElementById("remainingYears").textContent = `${Math.floor(remainingWeeks / 52)} años`;
</script>
